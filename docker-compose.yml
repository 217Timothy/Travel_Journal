services:
  db:
    image: postgres:15
    container_name: travel_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: travel_redis
    ports:
      - "6379:6379"

  backend:
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_backend
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    env_file:
      - .env
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_venv:
